version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demiurge_voice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/demiurge_voice
      LLM_PROVIDER: openrouter
      LLM_MODEL: google/gemini-2.0-flash-001
      DEBUG: "true"
      ENV: development
      PORT: "8000"
      HOST: "0.0.0.0"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - recordings:/tmp/recordings
      - transcripts:/tmp/transcripts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  recordings:
  transcripts:
